services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-forge-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=a_long_very_random_secret_string_for_development
      - DATABASE_URL=file:/app/dev.db
    volumes:
      - ./dev.db:/app/dev.db
